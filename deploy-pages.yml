name: Deploy static site to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "public_site/**"
      - "outputs/public_records_v01.csv"
      - "outputs/public_search_index_v01.csv"
      - "outputs/record_tags_v01.csv"
      - "outputs/public_tag_labels_v06.csv"
      - "outputs/review_flags_v01.csv"
      - "outputs/controlled_vocabulary_*.csv"
      - "scripts/build_public_site_data.ps1"
      - "scripts/build_downloads.ps1"
      - "scripts/verify_public_site.ps1"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild browser data
        shell: pwsh
        run: ./scripts/build_public_site_data.ps1

      - name: Rebuild downloadable CSV files
        shell: pwsh
        run: ./scripts/build_downloads.ps1

      - name: Verify public site data
        shell: pwsh
        run: ./scripts/verify_public_site.ps1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

